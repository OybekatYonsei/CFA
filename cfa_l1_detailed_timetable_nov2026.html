const container = document.getElementById('container');

function renderChecks(){
  try{return JSON.parse(localStorage.getItem('cfa28_v2')||'{}')}catch(e){return{}}
}
function saveCheck(wk,v){
  try{const d=renderChecks();d[wk]=v;localStorage.setItem('cfa28_v2',JSON.stringify(d))}catch(e){}
}

let checks = renderChecks();

function updateStats(){
  const wkItems = DATA.filter(d=>d.wk);
  const done = wkItems.filter(d=>checks[d.wk]).length;
  const total = wkItems.length;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent = Math.round(done/total*100)+'%';
  document.getElementById('s-left').textContent = total-done;
  document.getElementById('prog-fill').style.width = (done/total*100)+'%';
  document.getElementById('prog-txt').textContent = done+' / '+total;
  const examDate = new Date('2026-11-11');
  const today = new Date();
  const diff = Math.max(0, Math.ceil((examDate-today)/86400000));
  document.getElementById('s-days').textContent = diff;
}

DATA.forEach((d,i)=>{
  if(d.phase){
    const ph = document.createElement('div');
    ph.className = 'phase-header '+d.phaseClass;
    ph.textContent = d.label;
    container.appendChild(ph);
    return;
  }

  const priClass = d.pri==='HIGH'?'pri-high':d.pri==='MED'?'pri-med':'pri-std';
  const priLabel = d.pri==='HIGH'?'High priority':d.pri==='MED'?'Medium priority':'Standard';

  const tags = d.tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('');

  let readingsHtml = d.readings.map(r=>{
    const losList = r.los.map(l=>`<li class="${l.m?'must':''}">${l.t}</li>`).join('');
    return `<div class="reading-item"><div class="r-name">${r.r}</div><ul class="r-los">${losList}</ul></div>`;
  }).join('');

  let masterHtml = d.master.map(m=>`<li>${m}</li>`).join('');
  const isDone = checks[d.wk];

  const card = document.createElement('div');
  card.className = 'card'+(isDone?' is-done':'');
  card.id = 'w'+d.wk;

  card.innerHTML = `
    <div class="card-head" onclick="toggleCard(${d.wk})">
      <div class="winfo">
        <div class="wnum">Week ${d.wk}</div>
        <div class="wtitle">${d.title}</div>
        <div class="wdate">${d.dates}</div>
        <div class="tags">${tags}</div>
      </div>
      <div class="wright">
        <span class="wpri ${priClass}">${priLabel}</span>
        <span class="whrs">${d.hrs}</span>
        <div class="chk-row">
          <input type="checkbox" class="chk" ${isDone?'checked':''} onclick="event.stopPropagation();doCheck(${d.wk},this)">
          <span class="done-label">done</span>
        </div>
      </div>
    </div>
    <div class="body" id="b${d.wk}">
      <div class="section">
        <div class="sec-title">This week's priority</div>
        <div class="pri-box">${d.priority}</div>
      </div>
      <div class="section">
        <div class="sec-title">Learning outcomes <span style="font-size:9px;color:var(--color-text-secondary)">&nbsp;★ = must master</span></div>
        <div class="readings-grid">${readingsHtml}</div>
      </div>
      <div class="section">
        <div class="sec-title">Must master this week</div>
        <div class="master-box"><ul class="master-list">${masterHtml}</ul></div>
      </div>
      ${d.tip?`<div class="section"><div class="sec-title">Study tip</div><div class="tip-box">${d.tip}</div></div>`:''}
    </div>
  `;
  container.appendChild(card);
});

function toggleCard(wk){
  const b = document.getElementById('b'+wk);
  b.classList.toggle('open');
}

function doCheck(wk,el){
  checks[wk] = el.checked;
  saveCheck(wk,el.checked);
  const card = document.getElementById('w'+wk);
  if(el.checked) card.classList.add('is-done');
  else card.classList.remove('is-done');
  updateStats();
}

updateStats();
</script>
